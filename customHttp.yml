customHeaders:
  - pattern: '**'
    headers:
      # Five always-safe security headers (never break a static site). CSP is deliberately
      # NOT here — introduce it Report-Only first (see docs/security-hardening-checklist.md).
      - key: 'Strict-Transport-Security'
        value: 'max-age=63072000; includeSubDomains; preload'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'X-Frame-Options'
        value: 'DENY'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'camera=(), microphone=(), geolocation=()'
