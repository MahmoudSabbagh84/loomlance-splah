<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DPWEBECZBQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DPWEBECZBQ');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — LoomLance</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="app.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!--
      Sign-in is unified on the dashboard (app.loomlance.com/login), which owns the
      session. This page exists only to forward old links / bookmarks there.
    -->
    <script>
      (function () {
        var host = window.location.hostname
        var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0'
        var target = (isLocal ? 'http://localhost:4173' : 'https://app.loomlance.com') + '/login'
        window.__signinTarget = target
        // Forward immediately, replacing history so Back doesn't bounce here.
        window.location.replace(target)
      })()
    </script>
</head>
<body class="bg-bg text-fg">
    <main class="grid min-h-screen place-items-center px-5">
      <div class="card max-w-sm text-center">
        <div class="mx-auto grid size-12 place-items-center rounded-xl bg-primary/10 text-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
        </div>
        <h1 class="mt-4 text-lg font-bold">Taking you to sign in…</h1>
        <p class="mt-1.5 text-sm text-fg-muted">Redirecting you to the LoomLance app.</p>
        <a id="signinLink" href="https://app.loomlance.com/login" class="btn-primary mt-5 w-full">Continue to sign in</a>
      </div>
    </main>
    <script>
      // Point the manual link at the resolved (hostname-aware) target.
      var link = document.getElementById('signinLink')
      if (window.__signinTarget) link.href = window.__signinTarget
    </script>
</body>
</html>
